<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Board</title>
<style>
  :root {
    --ink: #14171C;
    --surface: #1D2129;
    --surface-raised: #262B35;
    --stamp: #E8A33D;
    --stamp-dim: #6b5527;
    --success: #4C9A6A;
    --text: #F2EFE9;
    --muted: #8B90A0;
    --line: #363C48;
    --danger: #C1594F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--ink);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 {
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-size: 34px;
    margin: 0;
    text-transform: uppercase;
  }
  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .pass {
    background: var(--surface);
    border: 1px dashed var(--stamp-dim);
    border-radius: 8px;
    padding: 12px 18px;
    min-width: 210px;
    position: relative;
  }
  .pass-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .pass-points {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    color: var(--stamp);
    font-weight: 700;
    line-height: 1;
  }
  .pass-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .progress-track {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--stamp);
    transition: width 0.4s ease;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 0 0 14px 2px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .ticket {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--line);
    overflow: hidden;
    position: relative;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .ticket.punched {
    opacity: 0;
    transform: scale(0.92);
  }
  .ticket-top {
    padding: 16px 16px 14px;
  }
  .ticket-link {
    color: var(--text);
    font-size: 14px;
    word-break: break-all;
    text-decoration: none;
    display: block;
    line-height: 1.4;
  }
  .ticket-link:hover { color: var(--stamp); }
  .perforation {
    position: relative;
    border-top: 1px dashed var(--line);
    margin: 0 16px;
  }
  .perforation::before, .perforation::after {
    content: '';
    position: absolute;
    top: -7px;
    width: 14px;
    height: 14px;
    background: var(--ink);
    border-radius: 50%;
  }
  .perforation::before { left: -23px; }
  .perforation::after { right: -23px; }
  .ticket-bottom {
    padding: 14px 16px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .like-btn {
    background: var(--stamp);
    color: var(--ink);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .like-btn:hover { filter: brightness(1.08); }
  .like-btn:disabled {
    background: var(--surface-raised);
    color: var(--muted);
    cursor: default;
  }
  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }
  .count b { color: var(--text); }
  form.submit {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
  }
  form.submit input {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
  }
  form.submit input:focus { outline: 2px solid var(--stamp); border-color: transparent; }
  form.submit button {
    background: var(--stamp);
    color: var(--ink);
    border: none;
    border-radius: 6px;
    padding: 12px 20px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  form.submit button:disabled {
    background: var(--surface-raised);
    color: var(--muted);
    cursor: default;
  }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .admin-tag {
    display: inline-block;
    font-size: 10px;
    background: var(--danger);
    color: var(--ink);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    letter-spacing: 0.5px;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-raised);
    border: 1px solid var(--stamp);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Exchange Board</h1>
      <div class="tagline" id="tagline">10 likes given = 1 pass. 1 pass = your video goes on the board.</div>
    </div>
    <div class="pass">
      <div class="pass-label">Your Pass</div>
      <div class="pass-points" id="pointsDisplay">0</div>
      <div class="pass-sub" id="progressText">0 / 10 likes given</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </header>

  <div class="section-label">On the board <span id="adminBadge"></span></div>
  <div class="board" id="board"></div>

  <div class="section-label">Add your video</div>
  <form class="submit" id="submitForm">
    <input type="url" id="videoLink" placeholder="Paste your video link (TikTok, YouTube, etc.)" required />
    <button type="submit" id="submitBtn">Spend 1 pass → List video</button>
    <div class="hint" id="submitHint"></div>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
const LIKES_PER_PASS = 10;
const LIKES_TO_GRADUATE = 10;
const isAdmin = new URLSearchParams(location.search).get('admin') === '1';

let myId = null;
let personal = { likesGiven: 0, pointsSpent: 0, likedIds: [] };
let videos = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function uid() {
  return 'u_' + Math.random().toString(36).slice(2, 11);
}

async function loadMyId() {
  try {
    const res = await window.storage.get('my-id', false);
    myId = res.value;
  } catch {
    myId = uid();
    await window.storage.set('my-id', myId, false);
  }
}

async function loadPersonal() {
  try {
    const res = await window.storage.get('my-progress', false);
    personal = JSON.parse(res.value);
  } catch {
    personal = { likesGiven: 0, pointsSpent: 0, likedIds: [] };
    await window.storage.set('my-progress', JSON.stringify(personal), false);
  }
}

async function savePersonal() {
  await window.storage.set('my-progress', JSON.stringify(personal), false);
}

async function loadVideos() {
  try {
    const res = await window.storage.get('videos', true);
    videos = JSON.parse(res.value);
  } catch {
    videos = [];
    await window.storage.set('videos', JSON.stringify(videos), true);
  }
}

async function saveVideos() {
  await window.storage.set('videos', JSON.stringify(videos), true);
}

function availablePoints() {
  const earned = Math.floor(personal.likesGiven / LIKES_PER_PASS);
  return Math.max(0, earned - personal.pointsSpent);
}

function render() {
  const pts = availablePoints();
  document.getElementById('pointsDisplay').textContent = pts;
  const inCycle = personal.likesGiven % LIKES_PER_PASS;
  document.getElementById('progressText').textContent = `${inCycle} / ${LIKES_PER_PASS} likes given`;
  document.getElementById('progressFill').style.width = `${(inCycle / LIKES_PER_PASS) * 100}%`;

  document.getElementById('adminBadge').innerHTML = isAdmin ? '<span class="admin-tag">ADMIN MODE</span>' : '';

  const board = document.getElementById('board');
  board.innerHTML = '';
  if (videos.length === 0) {
    board.innerHTML = '<div class="empty">Board is empty. Be the first to add a video.</div>';
  } else {
    videos.forEach(v => {
      const alreadyLiked = v.likedBy.includes(myId);
      const card = document.createElement('div');
      card.className = 'ticket';
      card.innerHTML = `
        <div class="ticket-top">
          <a class="ticket-link" href="${v.link}" target="_blank" rel="noopener noreferrer">${v.link}</a>
        </div>
        <div class="perforation"></div>
        <div class="ticket-bottom">
          <button class="like-btn" ${alreadyLiked ? 'disabled' : ''} data-id="${v.id}">
            ${alreadyLiked ? 'Liked' : 'Like'}
          </button>
          <span class="count"><b>${v.likes}</b> / ${LIKES_TO_GRADUATE}</span>
        </div>
      `;
      board.appendChild(card);
    });
  }

  const submitBtn = document.getElementById('submitBtn');
  const hint = document.getElementById('submitHint');
  if (pts > 0 || isAdmin) {
    submitBtn.disabled = false;
    hint.textContent = isAdmin ? 'Admin mode: listing is free.' : `You have ${pts} pass(es) available.`;
  } else {
    submitBtn.disabled = true;
    hint.textContent = `Like ${LIKES_PER_PASS - inCycle} more video(s) to earn a pass.`;
  }
}

async function handleLike(videoId) {
  const v = videos.find(x => x.id === videoId);
  if (!v || v.likedBy.includes(myId)) return;

  v.likedBy.push(myId);
  v.likes += 1;
  personal.likesGiven += 1;
  personal.likedIds.push(videoId);

  if (v.likes >= LIKES_TO_GRADUATE) {
    const card = [...document.querySelectorAll('.like-btn')].find(b => b.dataset.id === videoId)?.closest('.ticket');
    if (card) card.classList.add('punched');
    videos = videos.filter(x => x.id !== videoId);
    showToast('Video graduated off the board 🎟️');
  }

  await Promise.all([saveVideos(), savePersonal()]);
  setTimeout(render, videos.find(x => x.id === videoId) ? 0 : 500);
  if (personal.likesGiven % LIKES_PER_PASS === 0) {
    showToast('New pass earned!');
  }
  render();
}

document.getElementById('board').addEventListener('click', (e) => {
  const btn = e.target.closest('.like-btn');
  if (btn && !btn.disabled) handleLike(btn.dataset.id);
});

document.getElementById('submitForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('videoLink');
  const link = input.value.trim();
  if (!link) return;

  const pts = availablePoints();
  if (pts <= 0 && !isAdmin) {
    showToast('You need a pass first — like some videos.');
    return;
  }
  if (!isAdmin) personal.pointsSpent += 1;

  videos.push({ id: uid(), link, likes: 0, likedBy: [], addedBy: myId });
  await Promise.all([saveVideos(), savePersonal()]);
  input.value = '';
  showToast('Video added to the board.');
  render();
});

async function init() {
  await loadMyId();
  await loadPersonal();
  await loadVideos();
  render();
}

init();
</script>
</body>
</html>
