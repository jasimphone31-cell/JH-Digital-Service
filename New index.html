<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JH Digital Service</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#9d4edd 0%,#3c096c 35%,#12002b 100%);

color:white;

min-height:100vh;

overflow-x:hidden;

}

a{
text-decoration:none;
color:white;
}

.container{

width:95%;
max-width:1300px;

margin:auto;

}

/* ========= NAVBAR ========= */

nav{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px 0;

}

.logo{

font-size:28px;

font-weight:800;

background:linear-gradient(90deg,#ffffff,#ff5cd6);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.menu{

display:flex;

gap:18px;

}

.menu a{

padding:10px 18px;

border-radius:12px;

transition:.3s;

}

.menu a:hover{

background:rgba(255,255,255,.12);

}

/* ===== Hero CSS agle part me ===== */

</style>

</head>

<body>

<div class="container">

<nav>

<div class="logo">
JH DIGITAL SERVICE
</div>

<div class="menu">

<a href="#">Home</a>

<a href="#">Videos</a>

<a href="#">Pass</a>

<a href="#">Support</a>

</div>

</nav>
